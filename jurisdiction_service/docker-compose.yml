# Jurisdiction Service — PostGIS, Redis, API
# Запуск: docker-compose up
# API docs: http://localhost:8000/docs

services:
  postgis:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jurisdiction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jurisdiction_secret}
      POSTGRES_DB: ${POSTGRES_DB:-jurisdiction_db}
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./migrations/init_postgis.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jurisdiction} -d ${POSTGRES_DB:-jurisdiction_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jurisdiction}:${POSTGRES_PASSWORD:-jurisdiction_secret}@postgis:5432/${POSTGRES_DB:-jurisdiction_db}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      YANDEX_GEO_KEY: ${YANDEX_GEO_KEY:-}
      DADATA_TOKEN: ${DADATA_TOKEN:-}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-3600}
    depends_on:
      postgis:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgis_data:
  redis_data:
